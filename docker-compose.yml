services:
  muxarr:
    image: sjafferali/muxarr:latest
    container_name: muxarr
    ports:
      - "8080:8080"
    environment:
      # User/group ID to match your media file ownership
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # Application
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - WORKERS=${WORKERS:-2}

      # Radarr integration
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}

      # Sonarr integration
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
    restart: unless-stopped
    volumes:
      # Mount your media library (read-only is fine for scanning,
      # but read-write is needed for track removal/default changes)
      # - /path/to/your/media:/media
